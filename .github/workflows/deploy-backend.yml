name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/primedoor-api
            
            # Инициализация git если ещё не сделано
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi
            
            # Получаем последние изменения
            git fetch origin main
            
            # Копируем только backend файлы
            git checkout origin/main -- backend/server.js backend/bot.js backend/package.json
            
            # Перемещаем файлы из backend/ в текущую директорию
            cp backend/server.js ./server.js
            cp backend/bot.js ./bot.js
            cp backend/package.json ./package.json
            rm -rf backend/
            
            # Устанавливаем зависимости если package.json изменился
            npm install --production
            
            # Перезапускаем процессы
            pm2 restart primedoor-api
            pm2 restart primedoor-bot
            
            echo "✅ Backend deployed successfully"
