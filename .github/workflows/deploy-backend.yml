name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode SSH key
        id: ssh_key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          echo "DECODED_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/deploy_key >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload backend files to VPS backend directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ env.DECODED_KEY }}
          source: "backend/server.js,backend/bot.js,backend/package.json"
          target: "/var/www/primedoor-api/backend"
          strip_components: 1

      - name: Install deps and restart PM2 services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ env.DECODED_KEY }}
          script: |
            set -e
            cd /var/www/primedoor-api/backend
            npm install --production
            pm2 restart primedoor-api --update-env
            pm2 restart primedoor-bot --update-env
            pm2 save
            pm2 status
            echo "✅ Backend deployed successfully to /var/www/primedoor-api/backend"
